<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Care Log</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sage: #4a7c6f;
    --sage-light: #e8f2ef;
    --sage-mid: #b8d8d1;
    --peach: #e07a5f;
    --peach-light: #faeae5;
    --ivory: #faf8f4;
    --card: #ffffff;
    --border: #e4e1da;
    --border-strong: #ccc9c1;
    --text: #2d2d2a;
    --text-2: #5a5755;
    --text-3: #9a9790;
    --radius: 10px;
    --feed-color: #1D9E75;
    --feed-bg: #e1f5ee;
    --diaper-color: #185FA5;
    --diaper-bg: #e6f1fb;
    --sleep-color: #534AB7;
    --sleep-bg: #eeedfe;
    --note-color: #BA7517;
    --note-bg: #faeeda;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--ivory); color: var(--text); min-height: 100vh; }
  .app { max-width: 540px; margin: 0 auto; padding: 20px 16px 40px; }

  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .baby-name { font-size: 22px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .baby-name i { font-size: 20px; color: var(--sage); }
  .header-sub { font-size: 13px; color: var(--text-3); margin-top: 2px; }
  .settings-btn { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; color: var(--text-2); cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; }
  .settings-btn:hover { background: var(--ivory); }

  .panel { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 14px; }

  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .sum-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 12px 10px; text-align: center; }
  .sum-icon { font-size: 22px; margin-bottom: 3px; }
  .sum-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 2px; }
  .sum-time { font-size: 16px; font-weight: 600; }
  .sum-ago { font-size: 11px; color: var(--text-3); margin-top: 2px; line-height: 1.3; }

  .sec-label { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; }

  .quick-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .qbtn { background: var(--ivory); border: 1px solid var(--border); border-radius: 10px; padding: 12px 4px 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: all .15s; }
  .qbtn:hover { background: white; border-color: var(--border-strong); }
  .qbtn.active { background: var(--sage-light); border-color: var(--sage-mid); }
  .qbtn i { font-size: 22px; }
  .qbtn span { font-size: 11px; color: var(--text-2); }

  .form-panel { display: none; background: white; border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
  .form-panel.active { display: block; }
  .form-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }

  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .chip { padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border-strong); background: var(--ivory); color: var(--text-2); font-size: 13px; cursor: pointer; transition: all .15s; }
  .chip.sel { background: var(--sage-light); border-color: var(--sage); color: var(--sage); }

  .form-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .form-row label { font-size: 12px; color: var(--text-2); display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 120px; }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%; height: 38px; border-radius: 8px; border: 1px solid var(--border-strong);
    background: var(--ivory); color: var(--text); font-size: 14px; padding: 0 10px; font-family: inherit;
  }
  .form-row textarea { height: auto; min-height: 64px; padding: 8px 10px; resize: vertical; }

  .who-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
  .who-chip { padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border-strong); background: var(--ivory); color: var(--text-2); font-size: 13px; cursor: pointer; transition: all .15s; }
  .who-chip.sel { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }

  .save-btn { width: 100%; height: 40px; border-radius: 9px; background: var(--sage); color: white; border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 14px; transition: opacity .15s; }
  .save-btn:hover { opacity: .88; }

  .timeline-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .tl-title { font-size: 14px; font-weight: 600; }
  .day-nav { display: flex; align-items: center; gap: 8px; }
  .day-nav button { background: white; border: 1px solid var(--border); border-radius: 6px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-2); }
  .day-nav button:hover { background: var(--ivory); }
  .day-label { font-size: 13px; color: var(--text-2); min-width: 60px; text-align: center; }

  .entry { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .entry:last-child { border-bottom: none; }
  .entry-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
  .entry-body { flex: 1; }
  .entry-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .entry-name { font-size: 14px; font-weight: 500; }
  .entry-right { display: flex; align-items: center; gap: 6px; }
  .entry-time { font-size: 12px; color: var(--text-3); }
  .entry-detail { font-size: 13px; color: var(--text-2); margin-top: 2px; }
  .entry-who { font-size: 11px; color: var(--text-3); margin-top: 3px; }
  .del-btn { background: none; border: none; color: var(--text-3); cursor: pointer; padding: 2px; border-radius: 4px; font-size: 14px; line-height: 1; }
  .del-btn:hover { color: #c0392b; }
  .empty { text-align: center; padding: 30px 0; color: var(--text-3); font-size: 14px; }
  .empty i { font-size: 36px; display: block; margin-bottom: 8px; opacity: .3; }

  .settings-panel { display: none; background: white; border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
  .ct-tag { display: inline-flex; align-items: center; gap: 4px; background: var(--ivory); border: 1px solid var(--border); border-radius: 20px; padding: 3px 8px 3px 10px; font-size: 12px; color: var(--text-2); }
  .ct-tag button { background: none; border: none; color: var(--text-3); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
  .ct-tag button:hover { color: #c0392b; }
  .add-row { display: flex; gap: 8px; margin-top: 8px; }
  .add-row input { flex: 1; height: 34px; border-radius: 7px; border: 1px solid var(--border-strong); background: var(--ivory); color: var(--text); font-size: 13px; padding: 0 10px; }
  .add-row button { height: 34px; padding: 0 12px; border-radius: 7px; border: 1px solid var(--border); background: var(--ivory); color: var(--text-2); cursor: pointer; font-size: 13px; white-space: nowrap; }
  .add-row button:hover { background: white; }

  @media (max-width: 420px) {
    .quick-btns { grid-template-columns: repeat(2, 1fr); }
    .summary-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div>
      <div class="baby-name"><i class="ti ti-baby-carriage"></i> <span id="babyNameDisplay">Baby</span></div>
      <div class="header-sub" id="todayDate"></div>
    </div>
    <button class="settings-btn" onclick="toggleSettings()"><i class="ti ti-settings"></i> Settings</button>
  </div>

  <!-- Settings -->
  <div class="settings-panel" id="settingsPanel">
    <div class="sec-label">Settings</div>
    <div class="form-row" style="margin-bottom:12px">
      <label>Baby's name <input type="text" id="babyNameInput" placeholder="e.g. Mia" maxlength="20"></label>
    </div>
    <div class="sec-label">Caretakers</div>
    <div id="ctTagList" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:2px"></div>
    <div class="add-row">
      <input type="text" id="newCaretaker" placeholder="Add a name…" maxlength="20">
      <button onclick="addCaretaker()"><i class="ti ti-plus" style="font-size:13px;vertical-align:-1px"></i> Add</button>
    </div>
    <button class="save-btn" onclick="saveSettings()">Save</button>
  </div>

  <!-- Summary cards -->
  <div class="summary-grid" id="summaryGrid"></div>

  <!-- Quick log -->
  <div class="panel" style="margin-bottom:14px">
    <div class="sec-label">Log entry</div>
    <div class="quick-btns">
      <button class="qbtn" id="qbtnFeed" onclick="openForm('feed')" style="color:var(--feed-color)"><i class="ti ti-bottle"></i><span>Feeding</span></button>
      <button class="qbtn" id="qbtnDiaper" onclick="openForm('diaper')" style="color:var(--diaper-color)"><i class="ti ti-wind"></i><span>Diaper</span></button>
      <button class="qbtn" id="qbtnSleep" onclick="openForm('sleep')" style="color:var(--sleep-color)"><i class="ti ti-moon"></i><span>Sleep</span></button>
      <button class="qbtn" id="qbtnNote" onclick="openForm('note')" style="color:var(--note-color)"><i class="ti ti-notes"></i><span>Note</span></button>
    </div>
  </div>

  <!-- Feed form -->
  <div class="form-panel" id="formFeed">
    <div class="form-title" style="color:var(--feed-color)"><i class="ti ti-bottle"></i> Log feeding</div>
    <div class="sec-label">Type</div>
    <div class="chip-row" id="feedTypeChips">
      <div class="chip sel" onclick="selectChip(this,'feedTypeChips')">Breast</div>
      <div class="chip" onclick="selectChip(this,'feedTypeChips')">Bottle</div>
      <div class="chip" onclick="selectChip(this,'feedTypeChips')">Formula</div>
      <div class="chip" onclick="selectChip(this,'feedTypeChips')">Solids</div>
    </div>
    <div class="form-row">
      <label>Amount / duration <input type="text" id="feedAmount" placeholder="e.g. 4 oz, 15 min"></label>
      <label>Time <input type="time" id="feedTime"></label>
    </div>
    <div class="sec-label">Logged by</div>
    <div class="who-row" id="feedWho"></div>
    <div class="form-row" style="margin-top:10px"><label>Notes (optional) <textarea id="feedNote" placeholder="Any extra details…"></textarea></label></div>
    <button class="save-btn" onclick="saveEntry('feed')">Save feeding</button>
  </div>

  <!-- Diaper form -->
  <div class="form-panel" id="formDiaper">
    <div class="form-title" style="color:var(--diaper-color)"><i class="ti ti-wind"></i> Log diaper change</div>
    <div class="sec-label">Type</div>
    <div class="chip-row" id="diaperTypeChips">
      <div class="chip sel" onclick="selectChip(this,'diaperTypeChips')">Wet</div>
      <div class="chip" onclick="selectChip(this,'diaperTypeChips')">Dirty</div>
      <div class="chip" onclick="selectChip(this,'diaperTypeChips')">Both</div>
      <div class="chip" onclick="selectChip(this,'diaperTypeChips')">Dry</div>
    </div>
    <div class="form-row">
      <label>Time <input type="time" id="diaperTime"></label>
    </div>
    <div class="sec-label">Logged by</div>
    <div class="who-row" id="diaperWho"></div>
    <div class="form-row" style="margin-top:10px"><label>Notes (optional) <textarea id="diaperNote" placeholder="Color, consistency, anything notable…"></textarea></label></div>
    <button class="save-btn" onclick="saveEntry('diaper')">Save diaper change</button>
  </div>

  <!-- Sleep form -->
  <div class="form-panel" id="formSleep">
    <div class="form-title" style="color:var(--sleep-color)"><i class="ti ti-moon"></i> Log sleep</div>
    <div class="sec-label">Type</div>
    <div class="chip-row" id="sleepTypeChips">
      <div class="chip sel" onclick="selectChip(this,'sleepTypeChips')">Nap</div>
      <div class="chip" onclick="selectChip(this,'sleepTypeChips')">Night sleep</div>
    </div>
    <div class="form-row">
      <label>Start <input type="time" id="sleepStart"></label>
      <label>End (optional) <input type="time" id="sleepEnd"></label>
    </div>
    <div class="sec-label">Logged by</div>
    <div class="who-row" id="sleepWho"></div>
    <div class="form-row" style="margin-top:10px"><label>Notes (optional) <textarea id="sleepNote" placeholder="How they slept, wake-ups, etc."></textarea></label></div>
    <button class="save-btn" onclick="saveEntry('sleep')">Save sleep</button>
  </div>

  <!-- Note form -->
  <div class="form-panel" id="formNote">
    <div class="form-title" style="color:var(--note-color)"><i class="ti ti-notes"></i> Add note</div>
    <div class="form-row">
      <label>Time <input type="time" id="noteTime"></label>
    </div>
    <div class="sec-label">Logged by</div>
    <div class="who-row" id="noteWho"></div>
    <div class="form-row" style="margin-top:10px"><label>Note <textarea id="noteText" placeholder="Anything worth tracking — mood, symptoms, milestones…" style="min-height:80px"></textarea></label></div>
    <button class="save-btn" onclick="saveEntry('note')">Save note</button>
  </div>

  <!-- Timeline -->
  <div class="panel">
    <div class="timeline-header">
      <div class="tl-title">Log</div>
      <div class="day-nav">
        <button onclick="changeDay(-1)" aria-label="Previous day"><i class="ti ti-chevron-left" style="font-size:14px"></i></button>
        <span class="day-label" id="dayLabel">Today</span>
        <button onclick="changeDay(1)" aria-label="Next day"><i class="ti ti-chevron-right" style="font-size:14px"></i></button>
      </div>
    </div>
    <div id="timeline"></div>
  </div>
</div>

<script>
const TYPE_META = {
  feed:   { icon:'ti-bottle', color:'var(--feed-color)',   bg:'var(--feed-bg)',   label:'Feeding' },
  diaper: { icon:'ti-wind',   color:'var(--diaper-color)', bg:'var(--diaper-bg)', label:'Diaper' },
  sleep:  { icon:'ti-moon',   color:'var(--sleep-color)',  bg:'var(--sleep-bg)',  label:'Sleep' },
  note:   { icon:'ti-notes',  color:'var(--note-color)',   bg:'var(--note-bg)',   label:'Note' }
};

let STATE = {
  babyName: 'Baby',
  caretakers: ['Mom', 'Dad', 'Grandma', 'Nanny'],
  entries: []
};
let dayOffset = 0;
let openType = null;

function load() {
  try {
    const s = localStorage.getItem('babyCareLog_v1');
    if (s) STATE = JSON.parse(s);
  } catch(e) {}
  document.getElementById('babyNameInput').value = STATE.babyName;
  document.getElementById('babyNameDisplay').textContent = STATE.babyName;
  document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  renderCtTags();
  refreshAllWho();
  setNowTimes();
  renderSummary();
  renderTimeline();
}

function persist() { localStorage.setItem('babyCareLog_v1', JSON.stringify(STATE)); }

function setNowTimes() {
  const hhmm = new Date().toTimeString().slice(0,5);
  ['feedTime','diaperTime','sleepStart','sleepEnd','noteTime'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = hhmm;
  });
}

function toggleSettings() {
  const p = document.getElementById('settingsPanel');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function saveSettings() {
  const n = document.getElementById('babyNameInput').value.trim();
  if (n) { STATE.babyName = n; document.getElementById('babyNameDisplay').textContent = n; }
  persist();
  document.getElementById('settingsPanel').style.display = 'none';
}

function addCaretaker() {
  const inp = document.getElementById('newCaretaker');
  const n = inp.value.trim();
  if (n && !STATE.caretakers.includes(n)) {
    STATE.caretakers.push(n);
    persist();
    renderCtTags();
    refreshAllWho();
  }
  inp.value = '';
}

function removeCaretaker(name) {
  STATE.caretakers = STATE.caretakers.filter(c => c !== name);
  persist();
  renderCtTags();
  refreshAllWho();
}

function renderCtTags() {
  const el = document.getElementById('ctTagList');
  el.innerHTML = STATE.caretakers.map(name =>
    `<span class="ct-tag">${name}<button onclick="removeCaretaker('${name}')" title="Remove">×</button></span>`
  ).join('');
}

function refreshAllWho() { ['feed','diaper','sleep','note'].forEach(t => renderWho(t)); }

function renderWho(type) {
  const el = document.getElementById(type + 'Who');
  if (!el) return;
  el.innerHTML = STATE.caretakers.map((name,i) =>
    `<div class="who-chip${i===0?' sel':''}" onclick="selectWho(this,'${type}')">${name}</div>`
  ).join('');
}

function selectWho(el, type) {
  document.querySelectorAll(`#${type}Who .who-chip`).forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
}

function selectChip(el, groupId) {
  document.querySelectorAll(`#${groupId} .chip`).forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
}

function getChip(groupId) {
  const el = document.querySelector(`#${groupId} .chip.sel`);
  return el ? el.textContent : '';
}

function getWho(type) {
  const el = document.querySelector(`#${type}Who .who-chip.sel`);
  return el ? el.textContent : '';
}

function openForm(type) {
  ['feed','diaper','sleep','note'].forEach(t => {
    document.getElementById('form'+t.charAt(0).toUpperCase()+t.slice(1)).classList.remove('active');
    document.getElementById('qbtn'+t.charAt(0).toUpperCase()+t.slice(1)).classList.remove('active');
  });
  if (openType === type) { openType = null; return; }
  openType = type;
  setNowTimes();
  const key = 'form' + type.charAt(0).toUpperCase() + type.slice(1);
  document.getElementById(key).classList.add('active');
  document.getElementById('qbtn' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('active');
  setTimeout(() => document.getElementById(key).scrollIntoView({behavior:'smooth',block:'nearest'}), 50);
}

function dateStr(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0,10);
}

function saveEntry(type) {
  const now = new Date();
  const hhmm = now.toTimeString().slice(0,5);
  let detail = '', subtype = '', time = hhmm;

  if (type === 'feed') {
    subtype = getChip('feedTypeChips');
    const amt = document.getElementById('feedAmount').value.trim();
    time = document.getElementById('feedTime').value || hhmm;
    const note = document.getElementById('feedNote').value.trim();
    detail = [subtype, amt, note].filter(Boolean).join(' · ');
    document.getElementById('feedAmount').value = '';
    document.getElementById('feedNote').value = '';
  } else if (type === 'diaper') {
    subtype = getChip('diaperTypeChips');
    time = document.getElementById('diaperTime').value || hhmm;
    const note = document.getElementById('diaperNote').value.trim();
    detail = [subtype, note].filter(Boolean).join(' · ');
    document.getElementById('diaperNote').value = '';
  } else if (type === 'sleep') {
    subtype = getChip('sleepTypeChips');
    const st = document.getElementById('sleepStart').value;
    const en = document.getElementById('sleepEnd').value;
    time = st || hhmm;
    let dur = '';
    if (st && en) {
      const [sh,sm] = st.split(':').map(Number);
      const [eh,em] = en.split(':').map(Number);
      const mins = (eh*60+em) - (sh*60+sm);
      if (mins > 0) dur = (Math.floor(mins/60) ? Math.floor(mins/60)+'h ' : '') + (mins%60 ? mins%60+'m' : '');
    }
    const note = document.getElementById('sleepNote').value.trim();
    detail = [subtype, dur, note].filter(Boolean).join(' · ');
    document.getElementById('sleepNote').value = '';
  } else if (type === 'note') {
    time = document.getElementById('noteTime').value || hhmm;
    detail = document.getElementById('noteText').value.trim();
    document.getElementById('noteText').value = '';
    if (!detail) return;
  }

  STATE.entries.push({ id: Date.now().toString(), type, detail, time, date: dateStr(0), who: getWho(type) });
  persist();
  renderSummary();
  renderTimeline();
  openForm(type); // toggles off
}

function deleteEntry(id) {
  STATE.entries = STATE.entries.filter(e => e.id !== id);
  persist();
  renderSummary();
  renderTimeline();
}

function agoText(timeStr, dateStr) {
  const then = new Date(dateStr + 'T' + timeStr);
  const mins = Math.round((Date.now() - then) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const h = Math.floor(mins/60), m = mins%60;
  return m ? h+'h '+m+'m ago' : h+'h ago';
}

function renderSummary() {
  const today = dateStr(0);
  const todayE = STATE.entries.filter(e => e.date === today);
  const grid = document.getElementById('summaryGrid');
  const cfg = [
    { type:'feed',   icon:'ti-bottle', label:'Last fed',    color:'var(--feed-color)' },
    { type:'diaper', icon:'ti-wind',   label:'Last diaper', color:'var(--diaper-color)' },
    { type:'sleep',  icon:'ti-moon',   label:'Last sleep',  color:'var(--sleep-color)' }
  ];
  grid.innerHTML = cfg.map(c => {
    const matches = todayE.filter(e => e.type === c.type).sort((a,b) => b.time.localeCompare(a.time));
    const last = matches[0];
    const val = last ? last.time : '—';
    const ago = last ? agoText(last.time, last.date) : 'not yet today';
    return `<div class="sum-card">
      <div class="sum-icon" style="color:${c.color}"><i class="ti ${c.icon}"></i></div>
      <div class="sum-label">${c.label}</div>
      <div class="sum-time">${val}</div>
      <div class="sum-ago">${ago}</div>
    </div>`;
  }).join('');
}

function changeDay(dir) {
  dayOffset = Math.min(0, dayOffset + dir);
  renderTimeline();
  const el = document.getElementById('dayLabel');
  if (dayOffset === 0) el.textContent = 'Today';
  else if (dayOffset === -1) el.textContent = 'Yesterday';
  else {
    const d = new Date(); d.setDate(d.getDate() + dayOffset);
    el.textContent = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }
}

function renderTimeline() {
  const ds = dateStr(dayOffset);
  const entries = STATE.entries.filter(e => e.date === ds).sort((a,b) => b.time.localeCompare(a.time));
  const tl = document.getElementById('timeline');
  if (!entries.length) {
    tl.innerHTML = '<div class="empty"><i class="ti ti-baby-carriage"></i>No entries yet</div>';
    return;
  }
  tl.innerHTML = entries.map(e => {
    const m = TYPE_META[e.type];
    return `<div class="entry">
      <div class="entry-icon" style="background:${m.bg};color:${m.color}"><i class="ti ${m.icon}"></i></div>
      <div class="entry-body">
        <div class="entry-top">
          <span class="entry-name">${m.label}</span>
          <span class="entry-right">
            <span class="entry-time">${e.time}</span>
            <button class="del-btn" onclick="deleteEntry('${e.id}')" title="Delete"><i class="ti ti-trash" style="font-size:13px"></i></button>
          </span>
        </div>
        ${e.detail ? `<div class="entry-detail">${e.detail}</div>` : ''}
        ${e.who ? `<div class="entry-who"><i class="ti ti-user" style="font-size:11px;vertical-align:-1px"></i> ${e.who}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

load();

document.getElementById('newCaretaker').addEventListener('keydown', e => { if (e.key === 'Enter') addCaretaker(); });
</script>
</body>
</html>
